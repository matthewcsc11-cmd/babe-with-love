<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💜 Surprise</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      font-family: sans-serif
    }

    canvas {
      display: block
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, .25);
      color: #e0d9ff;
      z-index: 10;
      text-align: center
    }

    .hidden {
      display: none
    }

    .btn {
      margin-top: 30px;
      padding: 14px 30px;
      border-radius: 30px;
      background: #6b4bff;
      color: white;
      cursor: pointer
    }

    .gift {
      font-size: 90px;
      animation: float 2s infinite
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-15px)
      }
    }

    input {
      padding: 12px 18px;
      border-radius: 20px;
      border: none;
      font-size: 18px;
      text-align: center
    }

    .final-img {
      max-width: 80%;
      max-height: 70%;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(160, 130, 255, .8);
      animation: fadeIn 2s
    }

    .listen-text {
      margin-top: 20px;
      opacity: .8
    }

    .final-message {
      margin-top: 30px;
      font-size: 22px;
      line-height: 1.6;
      opacity: 0;
      animation: fadeUp 2.5s forwards
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(.9)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body>

  <div id="page1" class="screen">
    <div class="gift">🎁</div>
    <div class="btn" id="openGift">เปิดของขวัญ</div>
  </div>

  <div id="page2" class="screen hidden">
    <h2>🔐 ใส่รหัส</h2>
    <input id="pass">
    <div class="btn" id="passBtn">ยืนยัน</div>
  </div>

  <div id="page3" class="screen hidden">
    <img src="final.png" class="final-img">
    <div id="listenText" class="listen-text">🎧 ฟังเพลงให้จบ 💜</div>
    <div id="finalMessage" class="final-message hidden">
      สุขสันต์วันครบรอบนะ เค้ารักเบบี๋มากๆเลย<br>
      ขอบคุณที่เข้ามาในจักรวาลของเค้านะ 💫
    </div>
  </div>

  <canvas id="c"></canvas>

  <audio id="bgm" preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    /* ===== CANVAS ===== */
    const canvas = c, ctx = canvas.getContext("2d");
    function resize() { canvas.width = innerWidth; canvas.height = innerHeight }
    resize(); addEventListener("resize", resize);

    /* ===== AUDIO ===== */
    const audio = bgm;
    let audioCtx;
    function startAudio() {
      if (audioCtx) return;
      audio.muted = true; audio.play();
      const AC = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AC();
      const src = audioCtx.createMediaElementSource(audio);
      src.connect(audioCtx.destination);
      audioCtx.resume().then(() => { audio.muted = false; audio.play() });
      audio.onended = () => {
        listenText.classList.add("hidden");
        finalMessage.classList.remove("hidden");
      }
    }

    /* ===== NAV ===== */
    openGift.onclick = () => {
      page1.classList.add("hidden");
      page2.classList.remove("hidden");
    }
    passBtn.onclick = () => {
      if (pass.value === "060225") {
        page2.classList.add("hidden");
        page3.classList.remove("hidden");
        startAudio();
      } else alert("รหัสไม่ถูกต้อง");
    }

    /* ===== GALAXY ===== */
    function drawSpace() {
      const g = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, canvas.width
      );
      g.addColorStop(0, "#1b0c3f");
      g.addColorStop(.5, "#06001a");
      g.addColorStop(1, "#000");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    /* ===== STARS ===== */
    const stars = [...Array(160)].map(() => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + .4,
      t: Math.random() * Math.PI * 2
    }));
    function drawStars() {
      stars.forEach(s => {
        s.t += .02;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r + Math.sin(s.t) * .4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,.8)";
        ctx.fill();
      });
    }

    /* ===== METEOR ===== */
    let meteors = [];
    setInterval(() => meteors.push({
      x: Math.random() * canvas.width,
      y: -50, vx: Math.random() * 6 + 8,
      vy: Math.random() * 6 + 10, life: 70
    }), 3000);

    function drawMeteors() {
      meteors.forEach(m => {
        ctx.beginPath();
        ctx.moveTo(m.x, m.y);
        ctx.lineTo(m.x - m.vx * 5, m.y - m.vy * 5);
        ctx.strokeStyle = "rgba(200,200,255,.8)";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#bbaaff";
        ctx.stroke();
        m.x += m.vx; m.y += m.vy; m.life--;
      });
      meteors = meteors.filter(m => m.life > 0);
    }

    /* ===== HEART ===== */
    function heart(t) {
      return {
        x: 16 * Math.sin(t) ** 3,
        y: 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)
      }
    }
    class FloatingHeart {
      constructor() { this.reset() }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + 200;
        this.s = Math.random() * .25 + .2;
        this.v = Math.random() * .4 + .2;
        this.a = Math.random() * Math.PI * 2;
      }
      update() {
        this.y -= this.v;
        this.a += .02;
        this.x += Math.sin(this.a) * .4;
        if (this.y < -80) this.reset();
      }
      draw() {
        ctx.beginPath();
        for (let t = 0; t <= Math.PI * 2; t += .12) {
          const p = heart(t);
          const x = this.x + p.x * this.s;
          const y = this.y - p.y * this.s;
          t ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        }
        ctx.strokeStyle = "rgba(160,130,255,.9)";
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#5b3bff";
        ctx.stroke();
      }
    }
    const hearts = [...Array(14)].map(() => new FloatingHeart());

    /* ===== LOOP ===== */
    function loop() {
      drawSpace();
      drawStars();
      drawMeteors();
      hearts.forEach(h => { h.update(); h.draw() });
      requestAnimationFrame(loop);
    }
    loop();
  </script>

</body>

</html>
